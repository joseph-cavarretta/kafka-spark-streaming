name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dev tools (validates lockfile)
        run: uv sync --locked --only-group dev

      - name: Ruff lint (incl. security rules)
        run: uv run --no-sync ruff check .

      - name: Ruff format
        run: uv run --no-sync ruff format --check .

      - name: Mypy
        run: uv run --no-sync mypy src
